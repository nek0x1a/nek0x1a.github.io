# -------------------------------------------------------------------------------------
# 主题核心配置
# 参数分为两类：
#   1. 站点级参数 — 适用于整个站点，不能在单页中覆盖。
#   2. 页面级参数 — 可通过页面 Front Matter 在每页中覆盖。
#
# 参见: https://fixit.lruihao.cn/documentation/basics/#theme-configuration
# -------------------------------------------------------------------------------------

# FixIt 主题版本
version = "1.0.X" # 例如 "0.4.X"、"0.4.5"、"v1.0.0" 等。
# 站点描述
description = "猫猫的记录"
# 站点关键词
keywords = ["Hugo", "猫猫的博客", "计算机技巧", "二次元", "日常吐槽"]
# 站点默认主题 ["light", "dark", "auto"]
default_theme = "auto"
# 用于 SRI 的哈希函数；为空时不启用 SRI
# ["sha256", "sha384", "sha512", "md5"]
fingerprint = "sha512"
# 日期格式
date_format = "2006-01-02"
# 用于 Open Graph 和 Twitter Cards 的站点图片
images = ["/images/logo.svg"]
# 是否将站点标题添加到每个页面的标题中
# 请在 `hugo.toml` 中配置站点标题，例如 `title = "title"`
with_site_title = true
# 当将站点标题添加到页面标题时使用的分隔符
title_delimiter = "-"
# 是否将站点副标题添加到首页标题中
# 请通过 `params.header.subtitle.name` 配置站点副标题
index_with_subtitle = false
# 是否启用从其他语言合并缺失翻译
# 当设为 true 时，会合并并显示其他语言中的缺失翻译
# 对于单语言站点，默认值为 false 以获得更好的性能
# 若站点拥有多语言并希望展示所有内容，请将其设为 true
enable_translation_merge = false
# 是否为带有 title 属性的元素启用工具提示替换，例如脚注引用
tooltip = true
# 默认情况下，FixIt 仅会在首页的 HTML 头部注入主题 Meta 标签。
# 你可以关闭它，但我们非常希望你不要这样做，因为这是了解 FixIt 受欢迎程度的好方式。
disable_theme_inject = false

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# 页面级参数
# 以下所有参数和章节都可以在页面 Front Matter 中用于按页覆盖。
#
# 示例 Front Matter：
#   ---
#   capitalize_titles: false
#   hidden_from_home_page: true
#   toc:
#     enable: true
#   math:
#     enable: true
#   comment:
#     enable: false
#   ---
#
# 参见: https://fixit.lruihao.cn/documentation/content-management/front-matter
# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# 是否将标题转为首字母大写
capitalize_titles = true
# 是否以纯文本显示摘要
summary_plainify = false
# 是否启用文章作者头像
author_avatar = true
# 是否从首页隐藏页面
hidden_from_home_page = false
# 是否从搜索结果中隐藏页面
hidden_from_search = false
# 是否从相关文章中隐藏页面
hidden_from_related = false
# 是否从 RSS、Atom 和 JSON Feed 中隐藏页面
hidden_from_feed = false
# 是否启用 twemoji
twemoji = false
# 是否启用 lightgallery
# 当设为 true 时，如果图片带有标题，例如 `![alt](src "title")`，内容中的图片将以画廊形式展示
# 当设为 "force" 时，无论图片是否带有标题，内容中的图片都会强制以画廊形式展示，例如 `![alt](src)`
# [todo] 后续会更换画廊引擎
lightgallery = false
# 是否启用 ruby 扩展语法
ruby = true
# 是否启用 fraction 扩展语法
fraction = true
# 是否启用 fontawesome 扩展语法
fontawesome = true
# 许可证信息（支持 HTML 格式）
license = '<a rel="license external nofollow noopener noreferrer" href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">CC BY-NC-SA 4.0</a>'
# 页面样式 ["narrow", "normal", "wide", ...]
page_style = "normal"
# 自动书签支持
# 若为 true，则在关闭页面时保存阅读进度。
auto_bookmark = false
# 是否显示最后修改时间
show_lastmod = true
# 是否启用 wordCount
word_count = true
# 是否启用 readingTime
reading_time = true
# 是否启用 instant.page
instant_page = false
# 是否在侧边栏启用合集列表
collection_list = false
# 是否在文章末尾启用合集导航
collection_navigation = false
# 文章末尾标记
end_flag = ""

# 作者配置
[author]
name = ""
email = ""
link = ""
avatar = ""

# 链接配置
[link]
# 是否自动为外部链接添加外部图标
external_icon = true

# 外部链接保护配置
[link.guard]
enable = false
# 外部链接保护模式，可用模式：["modal", "redirect"]
# 在 "modal" 模式下，当用户点击外部链接时，会弹出对话框要求确认
# 在 "redirect" 模式下，用户会先被重定向到中间页面，再访问外部链接
mode = "modal"
# 允许的域名（精确主机名或父域名）将跳过确认
allow_domains = []

# 图片配置
# 结合 Hugo 的图片处理选项 `imaging` 进行图片优化
[image]
# 缓存远程图片以获得更好的优化效果
cache_remote = false
# 调整图片尺寸并优化（可能会减慢构建）
optimise = false
# 需要从优化中排除的图片文件名或匹配模式列表
# 例如 ["no-optimize.jpg", "*.tiff", "images/exclude-*.webp"]
black_list = []

# 代码块包装配置
# 你可以通过 Markdown 属性覆盖全局配置，例如：
# ```lang {mode="mac", max_shown_lines=5}
# code here
# ```
[codeblock]
# 是否启用代码块包装器
wrapper = true
# 代码块模式
# 可用模式：["classic", "mac", "simple", ...]
# 如果你设置为自定义值，则需要为 data-mode 属性创建自定义 CSS
mode = "classic"
# 代码块包装器的附加类
# 例如 "is-collapsed is-expanded line-nos-hidden line-wrapping"
wrapper_class = ""
# 代码块预览中最多显示的行数
max_shown_lines = 10
# 是否显示代码块阴影效果，可选值：["always", "hover", "never"]
shadow = "never"
# 是否启用代码复制按钮
copyable = true
# [classic] 是否在代码块标题栏中启用代码下载按钮
downloadable = false
# [classic] 是否在代码块标题栏中启用代码全屏按钮
fullscreen = false
# [classic] 是否在代码块标题栏中启用行号切换按钮
line_nos_toggler = true
# [classic] 是否在代码块标题栏中启用自动换行切换按钮
line_wrap_toggler = true
# [classic][Experimental] 是否在代码块标题栏中启用代码编辑按钮
editable = false

# JSON 查看器配置
# 参见 https://github.com/Lruihao/json-viewer-element
[json_viewer]
enable = true
expand_depth = 1
copyable = true
sort = false
boxed = true

# 文件树配置
# 参见 https://fixit.lruihao.cn/documentation/content-management/shortcodes/extended/file-tree/
[filetree]
# 树的展开级别（全部展开：-1，全部折叠：0）
level = 1
# 是否为文件夹名称追加尾随 "/"
folder_slash = false
# 要忽略的文件或文件夹名称列表
ignore_list = []
# 要高亮显示的文件或文件夹名称列表
highlight_list = []

# Mermaid 配置
# 参见 http://fixit.lruihao.cn/documentation/content-management/diagrams-support/mermaid/
[mermaid]
# 是否启用 Mermaid 包装器
# 启用后，Mermaid 图表会被包装为图表标签页和操作项：
# - 平移/缩放（拖拽并按住 Ctrl + 滚轮）
# - 重置视图
# - 以 SVG 格式下载
wrapper = true
# Mermaid ESM 模块 CDN 源
# 默认为 https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs
cdn = ""
# ZenUML ESM 模块 CDN 源
# 默认为空，你可以将其设置为 CDN 源以启用 ZenUML 支持
# 例如 https://cdn.jsdelivr.net/npm/@mermaid-js/mermaid-zenuml/dist/mermaid-zenuml.esm.min.mjs
zenuml = ""
# 相关值请参见 https://mermaid.js.org/config/theming.html#available-themes
themes = [
  "neutral",
  "dark"
]
# Mermaid 图表的安全级别
# 可选值：["strict", "loose", "antiscript", "sandbox"]
security_level = "loose"
# Mermaid 图表的外观样式
# 可选值：["classic", "handDrawn"]
look = "classic"
# 指定渲染图表所使用的字体
font_family = ""
# ESM 模块 CDN 源中的布局加载器（例如 ELK 布局引擎）
# 示例：["https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk/dist/mermaid-layout-elk.esm.min.mjs"]
# 这将启用额外的布局选项：["elk", "elk.layered", "elk.stress", "elk.force", "elk.mrtree"]
layout_loaders = []
# 默认布局算法
# 可用选项："dagre"（默认）、"elk"、"elk.layered"、"elk.stress"、"elk.force"、"elk.mrtree"
# 注意：ELK 布局需要先配置 layout_loaders
layout = "dagre"

# 目录配置
[toc]
# 是否启用目录
enable = true
# 是否将目录静态置于文章前方
keep_static = false
# 是否让侧边栏中的目录自动折叠
auto = true
# TOC 位置 ["left", "right"]
position = "right"
# 覆盖 `markup.tableOfContents` 设置
ordered = false
start_level = 2
end_level = 6
# 是否降低内容中的 H1 标题级别
decrease_h1 = false

# 在文章开头显示提醒消息，提醒读者内容可能已过期
[expiration_reminder]
enable = false
# 如果最后修改时间超过 90 天，则显示提醒
reminder = 180
# 如果最后修改时间超过 180 天，则显示警告
warning = 365
# 若文章过期，是否关闭评论
close_comment = false

# 页面标题配置
[heading]
# 是否将标题中的自动文本转为首字母大写
capitalize = false

# 必须将 `params.toc.ordered` 设为 true
[heading.number]
# 是否启用自动标题编号
enable = false
# 仅在主章节页面（默认为 posts）中启用
only_main_section = true

[heading.number.format]
h1 = "{title}"
h2 = "{h2} {title}"
h3 = "{h2}.{h3} {title}"
h4 = "{h2}.{h3}.{h4} {title}"
h5 = "{h2}.{h3}.{h4}.{h5} {title}"
h6 = "{h2}.{h3}.{h4}.{h5}.{h6} {title}"

# 数学公式配置
# 参见 http://fixit.lruihao.cn/documentation/content-management/markdown-syntax/extended/#formula
[math]
enable = true
# 数学公式渲染引擎，可选值：["katex", "mathjax"]
type = "katex"

# KaTeX 服务端渲染 (https://katex.org)
# KaTeX 部分配置: https://gohugo.io/functions/transform/tomath/#options
[math.katex]
# KaTeX 扩展 copy-tex
copy_tex = true
throw_on_error = false
error_color = "#ff4949"

# 自定义宏映射
# 语法: <macro> = <definition>
[math.katex.macros]
# "\\f" = "#1f(#2)" # usage: $\f{a}{b}$

# MathJax 服务端渲染 (https://www.mathjax.org)
# MathJax 配置: https://docs.mathjax.org/en/latest/options/index.html
[math.mathjax]
cdn = "https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"

[math.mathjax.packages]
# "[+]" = ["configmacros"]

# 自定义宏映射
# 语法: <macro> = <definition>
[math.mathjax.macros]
# bold = ["{\\bf #1}", 1] # usage: $\bold{math}$

[math.mathjax.loader]
load = [ "ui/safe" ]

[math.mathjax.loader.paths]
# custom = "https://cdn.jsdelivr.net/gh/sonoisa/XyJax-v3@3.0.1/build/"

# 更多加载器配置，例如 source、dependencies、provides 等。

[math.mathjax.options]
enable_menu = true
# 不会被搜索为数学公式的 HTML 标签
skip_html_tags = [
  "script",
  "noscript",
  "style",
  "textarea",
  "pre",
  "code",
  "math",
  "select",
  "option",
  "mjx-container"
]
# 标记为不参与搜索的标签类名
ignore_html_class = "mathjax_ignore"

# 可出现在数学公式中的 HTML 标签
[math.mathjax.options.include_html_tags]
# "#comment" = ""
# br = "\n"
# wbr = ""

# Mapbox GL JS 配置 (https://docs.mapbox.com/mapbox-gl-js)
[mapbox]
# Mapbox GL JS 的访问令牌
access_token = ""
# 浅色主题样式
light_style = "mapbox://styles/mapbox/light-v11"
# 深色主题样式
dark_style = "mapbox://styles/mapbox/dark-v11"
# 是否添加 NavigationControl
navigation = true
# 是否添加 GeolocateControl
geolocate = true
# 是否添加 ScaleControl
scale = true
# 是否添加 FullscreenControl
fullscreen = true

