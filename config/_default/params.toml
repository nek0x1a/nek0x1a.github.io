light_theme = "light"
dark_theme = "dark"
lazy_load = true

# 第三方库配置
[library]

[library.css]
# someCSS = "some.css"
# located in "assets/"
# Or
# someCSS = "https://cdn.example.com/some.css"

[library.js]
# someJavascript = "some.js"
# located in "assets/"
# Or
# someJavascript = "https://cdn.example.com/some.js"
# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# 仅当启用 Git 信息时，才会公开 Git 仓库信息
[git_info]
# 例如 "https://github.com/hugo-fixit/docs"
repo = ""
branch = "main"
# 内容目录路径，相对于仓库根目录
dir = "content"
# 用于报告文章问题的 issue 模板
# 可用模板参数：{title} {URL} {sourceURL}
issue_tpl = "title=[BUG]%20{title}&body=|Field|Value|%0A|-|-|%0A|Title|{title}|%0A|URL|{URL}|%0A|Filename|{sourceURL}|"

# App 与 PWA 配置
[app]
# 是否启用 PWA 支持
pwa = true
# 用于主屏幕和 manifest 的应用名称（默认回退为站点标题）
name = "猫的笔记本"
# manifest 的可选短名称（默认回退为名称）
short_name = ""
# 是否省略 favicon 资源链接
no_favicon = false
# 用于替代旧版 .png 和 .ico 的现代 SVG favicon
svg_favicon = "/images/logo.svg"
# Safari 蒙版图标颜色
mask_color = "#f6f8fa"
# Windows v8-10 磁贴颜色
tile_color = "#f6f8fa"

# Android 浏览器主题色
[app.theme_color]
light = "#f6f8fa"
dark = "#151b23"

# Web App Manifest 图标（用户需要提供自己的图标文件）
[[app.icons]]
src = "/images/logo-180.png"
sizes = "180x180"
type = "image/png"
purpose = "any maskable"

[[app.icons]]
src = "/images/logo-192.png"
sizes = "192x192"
type = "image/png"

[[app.icons]]
src = "/images/logo-512.png"
sizes = "512x512"
type = "image/png"

# 搜索配置
[search]
enable = true
# 搜索引擎类型 ["fuse", "algolia", "pagefind", "cse"]
type = "fuse"
# 分块内容的最大索引长度
content_length = 4000
# 搜索栏占位符
placeholder = ""
# 搜索结果最大长度
max_result_length = 10
# 搜索结果片段长度
snippet_length = 30
# 搜索结果中高亮部分的 HTML 标签名
highlight_tag = "em"
# 是否在搜索索引中使用基于 baseURL 的绝对 URL
absolute_url = false
# 是否为搜索结果中的标题启用锚点化
anchorify = true

[search.algolia]
index = ""
app_id = ""
search_key = ""

# https://fusejs.io/api/options.html
[search.fuse]
is_case_sensitive = false
min_match_char_length = 2
find_all_matches = false
location = 0
threshold = 0.3
distance = 100
ignore_location = false
use_extended_search = false
ignore_field_norm = false

# Pagefind search config (http://pagefind.app/)
[search.pagefind]
# Pagefind bundle and index directory
bundle_path = "pagefind/"
# debounce timeout in milliseconds, set to 0 to disable debounce
debounce_timeout_ms = 300
# whether to respect FixIt built-in search visibility rules
use_built_in_filters = true
# optional sort field: ["date", "title"]
sort_by = ""
# sort order for sort_by: ["asc", "desc"]
sort_order = "desc"

# 自定义搜索引擎 (CSE)
[cse]
# 搜索引擎：["google", "bing"]
engine = "google"
# 搜索结果页面 URL（布局：search）
results_page = "/search/"

# Google 自定义搜索引擎上下文
# 参见: https://programmablesearchengine.google.com/
[cse.google]
cx = ""

# Bing 自定义搜索引擎上下文（未验证）
# 参见: https://www.customsearch.ai/
[cse.bing]
cx = ""

# 页头配置
[header]
# 桌面端页头模式 ["sticky", "normal", "auto"]
desktop_mode = "sticky"
# 移动端页头模式 ["sticky", "normal", "auto"]
mobile_mode = "auto"
# 是否启用页头模糊效果
blur = true

# 页头标题配置
[header.title]
# logo 的 URL
logo = "/images/logo.svg"
# 标题名称
name = ""
# 你可以在名称前添加额外信息（支持 HTML 格式），例如图标
pre = ""
# 你可以在名称后添加额外信息（支持 HTML 格式），例如图标
post = ""
# 是否为标题名称使用 typeit 动画
typeit = false

# 页头副标题配置
[header.subtitle]
# 副标题名称
name = "猫猫的记录"
# 是否为副标题名称使用 typeit 动画
typeit = true

# 面包屑配置
[breadcrumb]
enable = false
sticky = false
show_home = false
separator = "/"
capitalize = true

# 文章导航配置
[navigation]
# 是否在章节页面范围内显示文章导航
in_section = false
# 是否反转上/下一篇文章导航顺序
reverse = false

# 页脚配置
[footer]
enable = true
# 是否显示版权信息
copyright = true
# 是否显示作者
author = true
# 站点创建年份
since = "2022"
# 公网安全信息，仅适用于中国（支持 HTML 格式）
gov = ""
# ICP 信息，仅适用于中国（支持 HTML 格式）
icp = ""
# 许可证信息（支持 HTML 格式）
license = ""

# 是否显示 Hugo 和主题信息
[footer.powered]
enable = true
hugo_logo = false
theme_logo = false

# 站点创建时间
[footer.site_time]
enable = false
animate = true
icon = "fa-solid fa-heartbeat"
pre = ""
# 例如 "2021-12-18T16:15:22+08:00"
value = ""

# 页脚显示顺序，可选值：["first", 0-5, "last"]
[footer.order]
powered = 0
copyright = 0
statistics = 0
visitor = 0
beian = 0

# 归档页配置（所有 posts 类型页面）
[archives]
# 归档页中的文章数量
paginate = 20
# 日期格式（月份和日期）
date_format = "2006-01-02"

# 章节页配置（所有 section 页面）
[section]
# 每个章节页中的页面数量
paginate = 20
# 日期格式（月份和日期）
date_format = "2006-01-02"

# RSS、Atom 和 JSON Feed 的章节订阅配置。
[section.feed]
# 订阅中包含的文章数量；若设为 -1，则包含全部文章。
limit = -1
# 是否在订阅中显示完整文本内容。
full_text = true

# 术语列表（分类或标签）页配置
[list]
# 每个列表页中的文章数量
paginate = 20
# 日期格式（月份和日期）
date_format = "2006-01-02"

# RSS、Atom 和 JSON Feed 的术语列表订阅配置。
[list.feed]
# 订阅中包含的文章数量；若设为 -1，则包含全部文章。
limit = -1
# 是否在订阅中显示完整文本内容。
full_text = true

# 归档页、章节页和术语列表页的最近更新页面配置
[recently_updated]
archives = false
section = false
list = false
days = 30
max_count = 10

# 标签云配置
[tag_cloud]
enable = true
min = 14 # 最小字体大小（px）
max = 32 # 最大字体大小（px）
peak_count = 10 # 每个标签最多展示的文章数
orderby = "name" # 标签排序方式，可选值：["name", "count"]

